name: Release to PyPI

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual trigger publishes to TestPyPI for a dry-run

permissions:
  contents: read

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is deferred to v0.2 — vcpkg's per-component Boost ports
        # are incompatible with both the modern BoostConfig.cmake path and
        # the legacy FindBoost.cmake path our patched CMakeLists relies on.
        # Windows users can still install from sdist (`pip install pdtsp`
        # with MSVC + Boost on PATH).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pypa/cibuildwheel@v2.21

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pypa/build
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    if: github.event_name == 'workflow_dispatch'
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pdtsp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist/
      - name: Show artifacts
        run: ls -la dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pdtsp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist/
      - name: Show artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Sign with Sigstore and cut a GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist/

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated release for $GITHUB_REF_NAME. Install: \`pip install pdtsp==${GITHUB_REF_NAME#v}\`" \
            dist/**
