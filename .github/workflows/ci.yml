name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------- deps
      - name: Install Boost + CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make \
            libboost-program-options-dev libboost-filesystem-dev \
            libboost-system-dev libboost-regex-dev

      - name: Install Boost + CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install boost cmake

      - name: Install Boost (Windows / vcpkg)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # vcpkg is pre-installed on windows-latest at C:/vcpkg
          /c/vcpkg/vcpkg install boost-program-options boost-filesystem boost-system boost-regex --triplet x64-windows-static-md

      - name: Set CMake toolchain (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> "$GITHUB_ENV"
          echo "VCPKG_TARGET_TRIPLET=x64-windows-static-md" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------- py
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install PyPDTSP (builds pdphgs and pdprr from upstream)
        run: python -m pip install -e ".[test]"

      - name: Verify binaries were built
        shell: bash
        run: |
          ls pdtsp/
          if [ "$RUNNER_OS" = "Windows" ]; then
            test -f pdtsp/pdphgs.exe
            test -f pdtsp/pdprr.exe
          else
            test -f pdtsp/pdphgs
            test -f pdtsp/pdprr
          fi

      - name: Run tests
        run: pytest pdtsp/tests/ -v

      - name: Run examples
        run: |
          python examples/basic_hgs.py
          python examples/grubhub_matrix.py
