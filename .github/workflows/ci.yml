name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is deferred to v0.2 — vcpkg's per-component Boost ports
        # don't ship BoostConfig.cmake, and the legacy FindBoost.cmake path
        # can't locate them via the vcpkg toolchain. Tracking issue should
        # be opened before re-adding Windows here.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------- deps
      - name: Install Boost + CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make \
            libboost-program-options-dev libboost-filesystem-dev \
            libboost-system-dev libboost-regex-dev

      - name: Install Boost + CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install boost cmake

      # ----------------------------------------------------------------- py
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install PyPDTSP (builds pdphgs and pdprr from upstream)
        # Non-editable install. PEP 660 editable installs route through
        # `build_editable`, and on some setuptools/Python combos (observed
        # on macOS + Windows Python 3.10) setuptools picks the "lenient"
        # strategy, which writes a thin .pth shim and silently skips our
        # custom BuildPyCommand/DevelopCommand, leaving the binaries
        # unbuilt. `--config-settings editable_mode=compat` was tried first
        # and is honored inconsistently. Non-editable installs always go
        # through `build_wheel` → `build_py`, which reliably invokes our
        # BuildPyCommand across every Python version we support.
        run: python -m pip install ".[test]"

      - name: Verify binaries are in the installed package
        run: |
          python - <<'PY'
          import pathlib, pdtsp
          pkg = pathlib.Path(pdtsp.__file__).parent
          print("pdtsp installed at:", pkg)
          binaries = list(pkg.glob("pdphgs*")) + list(pkg.glob("pdprr*"))
          print("binaries:", [b.name for b in binaries])
          assert any(b.name == "pdphgs" for b in binaries), "missing pdphgs"
          assert any(b.name == "pdprr"  for b in binaries), "missing pdprr"
          PY

      - name: Run tests (via --pyargs from outside the repo)
        # We `cd` out of the repo so pytest's default sys.path additions
        # don't insert <repo>/ ahead of site-packages, which would shadow
        # the installed pdtsp (with binaries) with the local source
        # (without). `--pyargs pdtsp.tests` imports tests from the
        # installed package; the small-PDT fixture is inlined in the test,
        # so no repo-relative paths are needed.
        run: |
          mkdir -p "$RUNNER_TEMP/pytest-run"
          cd "$RUNNER_TEMP/pytest-run"
          python -m pytest --pyargs pdtsp.tests -v

      - name: Run examples
        run: |
          python examples/basic_hgs.py
          python examples/grubhub_matrix.py
